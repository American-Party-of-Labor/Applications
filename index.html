<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Reformat Tool</title>
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a0a;
            /* deep black-red base */
            font-family: Anton, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* ── main card ── */
        .container {
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            background: #630000;
            /* dark red / black */
            border-radius: 28px;
            padding: 36px 40px 44px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #F6C313 inset;
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            overflow:hidden;
            min-height: 90vh;
        }

        h1 {
            color: #F6C313;
            /* gold */
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(246, 195, 19, 0.25);
        }

        .subtitle {
            color: #e6c87a;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(246, 195, 19, 0.25);
            padding-bottom: 14px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ── label row ── */
        .label-row {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .label-row label {
            flex: 1;
            min-width: 120px;
            font-weight: 600;
            font-size: 1rem;
            color: #F6C313;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label-row label span {
            background: #AA0000;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #F6C313;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ── textareas ── */
        .textarea-grid {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0px;
        }

        .textarea-grid .input-box {
            display: flex;
            flex: 1 1 30%;
            flex-direction: column;
             min-height:0;
        }
        .textarea-grid .output-box{
            display: flex;
            flex: 1 1 70%;
            flex-direction: column;
            min-height:0;
        }
        textarea {
            flex: 1 0 auto;
            width: 100%;
            padding: 16px 18px;
            border-radius: 16px;
            border: 2px solid #8a1a1a;
            background: #1e0a0a;
            color: #f5e6c8;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.25s, box-shadow 0.25s;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6);
        }
        

        #outputContainer {
            flex: 1 0;
            min-height: 120px;
            background: #120606;
            border-radius: 16px;
            border: 2px solid #8a1a1a;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 12px;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6);
            transition: border-color 0.25s;
            overflow-y: auto;
            
        }

        #outputContainer:focus-within {
            border-color: #F6C313;
            box-shadow: 0 0 0 4px rgba(246, 195, 19, 0.2), inset 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        .message-box {
            background: #1e0a0a;
            border: 1px solid #7a2a2a;
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5e6c8;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            flex: 1 0 auto;
            min-width: 180px;
            max-width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s, background 0.2s;
        }

        .message-box:hover {
            border-color: #F6C313;
            background: #2a0f0f;
        }

        textarea:focus {
            outline: none;
            border-color: #F6C313;
            box-shadow: 0 0 0 4px rgba(246, 195, 19, 0.2), inset 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        textarea::placeholder {
            color: #7a5a4a;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
        }

        /* ── output specific ── */
        #outputText {
            background: #120606;
            color: #f5e6c8;
        }

        /* ── action bar ── */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: #AA0000;
            border: none;
            border-radius: 40px;
            padding: 12px 32px;
            font-weight: 700;
            font-size: 1rem;
            color: #F6C313;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #3f0000;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(246, 195, 19, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #3f0000, 0 8px 20px rgba(170, 0, 0, 0.4);
            background: #c20000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3f0000;
        }

        .btn-outline {
            background: transparent;
            box-shadow: none;
            border: 2px solid #AA0000;
            color: #F6C313;
        }

        .btn-outline:hover {
            background: #AA0000;
            box-shadow: 0 4px 0 #3f0000;
            transform: translateY(-2px);
        }

        .message-counter {
            color: #e6c87a;
            font-size: 0.9rem;
            background: #3f0a0a;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #7a2a2a;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .message-counter strong {
            color: #F6C313;
        }

        /* ── status / footer ── */
        .status-line {
            margin-top: 18px;
            display: flex;
            justify-content: flex-end;
            color: #b88a5a;
            font-size: 0.8rem;
            border-top: 1px solid rgba(246, 195, 19, 0.12);
            padding-top: 14px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-line .badge {
            background: #AA0000;
            padding: 2px 14px;
            border-radius: 40px;
            color: #F6C313;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .empty-message {
            color: #7a5a4a;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 16px,18px;
            text-align: left;
            width: 100%;
            line-height: 1.6;
        }

        /* ── responsive tweaks ── */
        @media (max-width: 700px) {
            .container {
                padding: 20px 16px 28px;
            }

            textarea {
                height: 240px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            h1 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-group {
                justify-content: center;
            }

            .message-counter {
                text-align: center;
            }
        }

        /* scrollbar styling */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1e0a0a;
            border-radius: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #AA0000;
            border-radius: 8px;
            border: 1px solid #F6C313;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #c20000;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>REFORMAT</h1>
        <p class="subtitle">paste application text to reformat automatically for posting</p>

        <!-- textareas -->
        <div class="textarea-grid">
            <div class="input-box">
                <div class="label-row">
                    <label>📥 Input <span>source</span></label>
                </div>
                <textarea id="inputText" placeholder="Paste your text here …"></textarea>
            </div>

            <div class="output-box">
                <div class="label-row">
                    <label>📤 Output <span>reformatted</span></label>
                </div>
                <div id="outputContainer">
                    <div class="empty-message">Reformatted messages will appear here</div>
                </div>
            </div>
        </div>

        <!-- action bar -->
        <div class="action-bar">
            <div class="btn-group">
                <button class="btn" id="reformatBtn">⟳ Reformat</button>
                <button class="btn btn-outline" id="clearBtn">✕ Clear</button>
                <div id="copyButtonGroup"></div>
            </div>
            <div class="message-counter">
                <strong id="messageCount">0</strong>
            </div>
        </div>
    </div>

    <!-- ──────────────────────────────────────────────── -->
    <script>
        // ─── exact port of the Python `reformat` function ───
        const character_limit = 2000 - 5; // 1995
        const message_divider_string = "\n\n\n\n"

        // TODO if the questions get changed this needs to be updated
        const exempted_questions = ["Email", "What is your preferred method of contact?", "Please give your Discord username and tag", "Please share links to all"]
        const last_name_question = "Last Name"
        const footer = "Submitted "

        reformatted_messages = []
        function reformat(text) {
            

            // split on "**" and remove the first element
            let splits = text.split("**");
            splits.shift();

            let questions = [];
            let i = 0;

            while (i < splits.length) {
                // skip exempted questions
                for (let q of exempted_questions){
                    if (splits[i].includes(q)){
                        i+=2
                        continue
                    }
                }
               

                // remove "*" from mandatory questions (global replace)
                splits[i] = splits[i].replace(/\*/g, "");
                splits[i + 1] = splits[i + 1].replace(/\*/g, "");

                // remove a new line if there are two of them
                if (splits[i + 1].startsWith("\n\n")) {
                    splits[i + 1] = splits[i + 1].substring(1);
                }

                // Reduce last name to first initial
                if (splits[i].includes(last_name_question)){
                    splits[i + 1] = splits[i + 1].substring(0,3) + "\n"
                }

                // Remove the footer from the final split
                if (i+2 == splits.length){
                    let index = splits[i + 1].indexOf(footer)
                    
                    // check to see if the character after the footer is a number
                    let c = parseInt(splits[i+1][index + footer.length])
                    if (!isNaN(c) && c!=-1){
                        splits[i+1] = splits[i+1].substring(0,index)
                    }
                }

                // append with bold markers added back
                questions.push("**" + splits[i] + "**" + splits[i + 1] + "\n");
                i += 2;
            }

            let current_message = "";
            let messages = [];

            for (let question of questions) {
                //if the question fits into the current message
                if (question.length + current_message.length <= character_limit) {

                    current_message += question;

                } else {
                    messages.push(current_message);
                    current_message = "";
                    // if the question is not going to fit in just one message
                    if (question.length > character_limit) {
                        let j = 0;
                        while (j * character_limit < question.length) {
                            messages.push(question.substring(j * character_limit, (j + 1) * character_limit));

                            j++;
                        }
                    }else{ //this is for a small question that doesn't fit in the current message
                        current_message += question
                    }   
                }
            }
            if (current_message !="" && current_message!="\n"){
                messages.push(current_message);
            }
            reformatted_messages = structuredClone(messages)
            updateMessageCount()
            renderMessages()
            addCopyButtons()
        }

        // ─── DOM refs ───
        const inputEl = document.getElementById('inputText');
        const outputContainer = document.getElementById('outputContainer');
        const reformatBtn = document.getElementById('reformatBtn');
        const clearBtn = document.getElementById('clearBtn');
        const messageCount = document.getElementById('messageCount');
        const copyButtonGroup = document.getElementById("copyButtonGroup")
                                                    
        // I don't care if adding event listeners is bad
        function renderMessages(){

            if (reformatted_messages.length===0){
                const empty = document.createElement("div");
                empty.className = "empty-message";
                empty.textContent = "Reformatted messages will appear here"
                outputContainer.appendChild(empty);
                return
            }

            for (let message of reformatted_messages){
                const box = document.createElement("div");
                box.className = "message-box";
                const textNode = document.createTextNode(message)
                box.appendChild(textNode)

                box.setAttribute('tabindex', '0');
                box.setAttribute('role', 'textbox');
                // click → focus the box
                box.addEventListener('click', function(e) {
                    this.focus();
                    navigator.clipboard.writeText(message)
                });

                outputContainer.appendChild(box)
            }

        }
        // I don't care if adding event listeners is bad
        function addCopyButtons(){

            if (reformatted_messages.length===0){
                return
            }
            let i = 0
            for (let message of reformatted_messages){
                const button = document.createElement("button");
                button.className = "btn-outline";
                button.textContent = "Copy msg " + String(i) 

                button.setAttribute('msgindex', i);
                // click → focus the box
                box.addEventListener('click', function(e) {
                    navigator.clipboard.writeText(message)
                });

                copyButtonGroup.appendChild(button)
                i+=1
            }

        }

        // ─── helpers ───
        function updateMessageCount() {
            messageCount.textContent = reformatted_messages.length + ' messages';
        }

        function runReformat() {
            outputContainer.replaceChildren()
            reformat(inputEl.value)
        }

        function clearAll() {
            inputEl.value = '';
            outputContainer.replaceChildren()
            copyButtonGroup.repalceChildren()
            runReformat()

            inputEl.focus();
        }
       
        // ─── events ───
        reformatBtn.addEventListener('click', runReformat);

        clearBtn.addEventListener('click', clearAll);

        //copyBtn.addEventListener('click', copyOutput);

        // live update on input change (optional, but nice)
        inputEl.addEventListener('input', () => {
            // auto-update? we'll let the user click reformat, but we could also auto-run with debounce.
            // For performance, we'll do a simple auto-run with a small delay.
            clearTimeout(inputEl._timer);
            inputEl._timer = setTimeout(() => {
                runReformat();
            }, 400);
        });

        // also run on paste
        inputEl.addEventListener('paste', () => {
            setTimeout(runReformat, 25);
        });

        // ─── initial run ───
        // The input has a default value, so run reformat on load.
        window.addEventListener('DOMContentLoaded', () => {
            runReformat();
        });


        // ─── extra: keyboard shortcut (Ctrl+Enter) ───
        inputEl.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runReformat();
            }
        });


        outputContainer.addEventListener('keydown', function(e) {
            const target = e.target;
            // Check if the target is a message-box or inside one
            const box = target.closest('.message-box');
            if (!box) return;

            if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
                e.preventDefault();
                e.stopPropagation(); // stop any further propagation
                const range = document.createRange();
                range.selectNodeContents(box);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
            }
        });

        // ─── also prevent default on document if needed ───
        document.addEventListener('keydown', function(e) {
            // If the target is inside a message-box, and it's Ctrl+A, we already handle it in the container.
            // But to be safe, we can let the container handle it.
            // However, if the event bubbles to document, we might want to stop it if it originated from a message-box.
            // We already stopPropagation in the container handler, so it shouldn't reach here.
            // But just in case, we can add a check.
            const box = e.target.closest?.('.message-box');
            if (box && (e.ctrlKey || e.metaKey) && e.key === 'a') {
                e.preventDefault();
            }
        });

    </script>

</body>
</html>
